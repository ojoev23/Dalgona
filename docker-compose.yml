services:
  postgres:
    image: postgres:15
    container_name: dalgona_db
    environment:
      POSTGRES_USER: dalgona_usr
      POSTGRES_PASSWORD: dalgona_pwd
      POSTGRES_DB: dalgona_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dalgona_usr -d dalgona_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dalgona_backend
    environment:
      DB_HOST: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dalgona_frontend
    environment:
      API_URL: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: