services:
  postgres:
    image: postgres:15
    container_name: dalgona_db
    environment:
      POSTGRES_USER: dalgona_usr
      POSTGRES_PASSWORD: dalgona_pwd
      POSTGRES_DB: dalgona_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: